name: ankros
channels:
  - conda-forge
  - bioconda
#
# PyTorch is installed from the pip wheel (cu121) in the `pip:` block below,
# NOT from conda-forge's `pytorch` package. Mixing the two caused the conda
# torch to get silently shadowed by pip's resolver during dependency
# installation of `transformers` / `accelerate` / `fair-esm`. Keeping torch
# pinned in one place (pip) makes `environment.yml` and the actual install
# agree. The conda CUDA stack (cuda-*, libcu*, cudnn, nccl, libmagma) is
# retained because AmberTools / OpenFF / OpenMM use it independently.
#
