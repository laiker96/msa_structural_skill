name: amber_cuda
channels:
  - conda-forge
dependencies:
  # Amber/pmemd CMake rejects CUDA 12.9 and newer. Keep this build env
  # separate from envs/ankros so the main analysis stack can keep CUDA 12.9.
  - cuda-version=12.8
  - cuda-nvcc-tools=12.8.93
  - cuda-nvcc-dev_linux-64=12.8.93
  - cuda-cuobjdump=12.8.90
  - cuda-libraries-dev=12.8.2
  - cmake=3.28.3
  - make=4.3
  - flex
  - bison
  - perl=5.32.1
  - python=3.10
  - zlib=1.3.1
  - bzip2=1.0.8
  - libblas
  - liblapack
  - libnetcdf
  - netcdf-fortran
  - fftw
  - nccl
  # Amber input preparation tools used by the FAD/FMN MD setup.
  - ambertools=24.8
  - pdb2pqr=3.6.1
  - openbabel=3.1.1
  - propka=3.5.1
  - parmed=4.3.1
